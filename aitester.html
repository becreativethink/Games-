<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Tester</title>

  <!-- html2canvas for screenshot capture -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ─── Google Fonts ─────────────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    /* ─── CSS Variables ─────────────────────────────────────────────────────── */
    :root {
      --bg-void:      #040608;
      --bg-panel:     #080d12;
      --bg-card:      #0d151e;
      --bg-input:     #0a1220;
      --border:       #1a2d40;
      --border-glow:  #0d7377;
      --accent:       #00e5ff;
      --accent-dim:   #0099aa;
      --accent-hot:   #00ffcc;
      --warn:         #ff6b35;
      --success:      #39ff14;
      --text-primary: #c8e6f0;
      --text-dim:     #4a7090;
      --text-bright:  #e8f8ff;
      --grid-color:   rgba(0, 229, 255, 0.18);
      --grid-text:    rgba(0, 229, 255, 0.65);
      --scanline:     rgba(0, 0, 0, 0.08);
      --glow-sm:      0 0 8px rgba(0, 229, 255, 0.4);
      --glow-md:      0 0 16px rgba(0, 229, 255, 0.5), 0 0 32px rgba(0, 229, 255, 0.2);
      --glow-hot:     0 0 12px rgba(0, 255, 204, 0.6);
      --font-mono:    'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
      --font-body:    'Rajdhani', sans-serif;
    }

    /* ─── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px,
        var(--scanline) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── App Shell ─────────────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: 64px 1fr;
      grid-template-columns: 1fr 420px;
      grid-template-areas:
        "topbar topbar"
        "preview chatpanel";
      width: 100vw;
      height: 100vh;
      gap: 0;
    }

    /* ─── TOP BAR ───────────────────────────────────────────────────────────── */
    #topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }

    #topbar::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 34px; height: 34px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--glow-sm);
      position: relative;
      overflow: hidden;
    }

    .brand-icon::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.1), transparent);
    }

    .brand-icon svg { width: 18px; height: 18px; fill: var(--accent); }

    .brand-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: var(--glow-sm);
      white-space: nowrap;
    }

    .brand-name span { color: var(--text-dim); font-weight: 400; }

    .topbar-divider {
      width: 1px; height: 32px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 4px;
    }

    /* URL Input */
    #url-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 12px;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #url-wrapper:focus-within {
      border-color: var(--accent-dim);
      box-shadow: var(--glow-sm);
    }

    .url-prefix {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-bright);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 0;
      caret-color: var(--accent);
    }

    #url-input::placeholder { color: var(--text-dim); }

    /* Buttons */
    .btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      border-radius: 5px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.18s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn svg { width: 14px; height: 14px; }

    .btn-start {
      background: linear-gradient(135deg, #005f6b, #007a82);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow-sm);
    }

    .btn-start:hover:not(:disabled) {
      background: linear-gradient(135deg, #007a82, #00a0aa);
      box-shadow: var(--glow-md);
      transform: translateY(-1px);
    }

    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: linear-gradient(135deg, #2a0a00, #3d1200);
      border-color: var(--warn);
      color: var(--warn);
    }

    .btn-stop:hover:not(:disabled) {
      background: linear-gradient(135deg, #3d1200, #5a1a00);
      box-shadow: 0 0 14px rgba(255,107,53,0.5);
      transform: translateY(-1px);
    }

    .btn-stop:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Status indicator */
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #status-dot.idle    { background: var(--text-dim); }
    #status-dot.running { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse-dot 1.4s ease-in-out infinite; }
    #status-dot.error   { background: var(--warn);    box-shadow: 0 0 8px var(--warn); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #status-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      min-width: 70px;
    }

    /* ─── LEFT PANEL – Preview ──────────────────────────────────────────────── */
    #preview-panel {
      grid-area: preview;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent-dim);
      text-transform: uppercase;
    }

    .panel-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 7px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 3px;
      color: var(--accent-dim);
    }

    #iframe-container {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }

    #site-iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* ─── Grid Overlay ──────────────────────────────────────────────────────── */
    #grid-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      pointer-events: none; /* pass clicks through */
      z-index: 10;
      opacity: 1;
    }

    .grid-cell {
      border-right: 1px solid var(--grid-color);
      border-bottom: 1px solid var(--grid-color);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2px 3px;
      transition: background 0.2s;
    }

    .grid-cell:nth-child(10n)  { border-right: none; }
    .grid-cell:nth-last-child(-n+10) { border-bottom: none; }

    .grid-cell.active {
      background: rgba(0, 229, 255, 0.12) !important;
    }

    .grid-cell.clicked {
      animation: cell-flash 0.5s ease-out;
    }

    @keyframes cell-flash {
      0%   { background: rgba(0, 255, 204, 0.4); }
      100% { background: transparent; }
    }

    .grid-num {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--grid-text);
      user-select: none;
      line-height: 1;
    }

    /* Grid toggle */
    #grid-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 9px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    #grid-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }

    /* Screenshot flash */
    #screenshot-flash {
      position: absolute;
      inset: 0;
      background: rgba(0, 229, 255, 0.07);
      pointer-events: none;
      opacity: 0;
      z-index: 20;
      transition: opacity 0.1s;
    }

    #screenshot-flash.flash {
      animation: snap-flash 0.25s ease-out;
    }

    @keyframes snap-flash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Crosshair cursor */
    #ai-cursor {
      position: absolute;
      width: 20px; height: 20px;
      margin-left: -10px; margin-top: -10px;
      pointer-events: none;
      z-index: 30;
      opacity: 0;
      transition: left 0.3s ease, top 0.3s ease, opacity 0.2s;
    }

    #ai-cursor::before,
    #ai-cursor::after {
      content: '';
      position: absolute;
      background: var(--accent-hot);
    }

    #ai-cursor::before { left: 9px; top: 0; width: 2px; height: 20px; }
    #ai-cursor::after  { left: 0; top: 9px; width: 20px; height: 2px; }

    #ai-cursor .cursor-ring {
      position: absolute;
      inset: 2px;
      border: 1.5px solid var(--accent-hot);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-hot);
    }

    /* ─── RIGHT PANEL – Chat / Logs ─────────────────────────────────────────── */
    #chat-panel {
      grid-area: chatpanel;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      overflow: hidden;
    }

    /* Stats row */
    #stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .stat-cell {
      background: var(--bg-card);
      padding: 8px 12px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow-sm);
      line-height: 1;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Chat log */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    #chat-log::-webkit-scrollbar { width: 4px; }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
    #chat-log::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: msg-in 0.25s ease-out;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .msg-role {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .msg-time {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
    }

    .msg-body {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
      padding: 8px 12px;
      border-radius: 4px;
      border-left: 2px solid transparent;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* AI reasoning */
    .msg.ai .msg-role   { color: var(--accent); }
    .msg.ai .msg-body   {
      background: rgba(0, 229, 255, 0.04);
      border-left-color: var(--accent-dim);
      color: var(--text-primary);
    }

    /* Command */
    .msg.cmd .msg-role  { color: var(--accent-hot); }
    .msg.cmd .msg-body  {
      background: rgba(0, 255, 204, 0.05);
      border-left-color: var(--accent-hot);
      color: var(--accent-hot);
      font-size: 13px;
    }

    /* System / log */
    .msg.sys .msg-role  { color: var(--text-dim); }
    .msg.sys .msg-body  {
      background: rgba(255,255,255,0.02);
      border-left-color: var(--border);
      color: var(--text-dim);
      font-size: 11px;
    }

    /* Error */
    .msg.err .msg-role  { color: var(--warn); }
    .msg.err .msg-body  {
      background: rgba(255, 107, 53, 0.06);
      border-left-color: var(--warn);
      color: var(--warn);
    }

    /* Success */
    .msg.ok .msg-role   { color: var(--success); }
    .msg.ok .msg-body   {
      background: rgba(57, 255, 20, 0.04);
      border-left-color: var(--success);
      color: var(--success);
    }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      flex-shrink: 0;
    }

    #typing-indicator.visible { display: flex; }

    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    .typing-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Next cycle bar */
    #cycle-bar-wrap {
      padding: 8px 12px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cycle-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    #cycle-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #cycle-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 2px;
      transition: width 0.1s linear;
      box-shadow: 0 0 6px var(--accent);
    }

    /* ─── Empty state ───────────────────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 100%;
      padding: 30px;
      text-align: center;
    }

    .empty-icon {
      width: 56px; height: 56px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.4;
    }

    .empty-icon svg { width: 24px; height: 24px; stroke: var(--accent-dim); fill: none; }

    .empty-title {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .empty-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0.5;
      line-height: 1.6;
    }

    /* ─── iframe placeholder ────────────────────────────────────────────────── */
    #iframe-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg-panel);
      z-index: 5;
    }

    .placeholder-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      opacity: 0.15;
    }

    .placeholder-cell {
      width: 28px; height: 28px;
      border: 1px solid var(--accent-dim);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--accent-dim);
    }

    .placeholder-text {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }

    .placeholder-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* ─── Scrollbar for chat ────────────────────────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border-glow) transparent; }

    /* ─── Responsive tweaks ─────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 64px 1fr 280px;
        grid-template-areas:
          "topbar"
          "preview"
          "chatpanel";
      }
      #chat-panel { border-top: 1px solid var(--border); }
      body { overflow: auto; }
      html, body { height: auto; }
      #app { height: auto; }
      #preview-panel { height: 50vh; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══════════════════ TOP BAR ═══════════════════ -->
  <header id="topbar">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">AI<span> WEBSITE</span> TESTER</span>
    </div>

    <div class="topbar-divider"></div>

    <div id="url-wrapper">
      <span class="url-prefix">URL</span>
      <input
        id="url-input"
        type="text"
        placeholder="https://example.com"
        value="https://example.com"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <button class="btn btn-start" id="btn-start" onclick="startTesting()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      START TESTING
    </button>

    <button class="btn btn-stop" id="btn-stop" onclick="stopTesting()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
