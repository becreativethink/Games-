<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:#04060e; --bg1:#070b14; --bg2:#0a0f1c;
  --surface:#0d1424; --card:#111929; --card2:#16203a; --lift:#1c2a46;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.11); --border3:rgba(255,255,255,0.05);
  --cyan:#00e5c8; --cyan2:#00c4ab; --cyan-glow:rgba(0,229,200,0.18);
  --blue:#4a9eff; --blue2:#2563eb; --purple:#9d7aff; --red:#ff6b7a;
  --amber:#ffca45; --green:#34d399;
  --pfree:#94a3b8; --pbasic:#60a5fa; --pstd:#c084fc; --pprem:#fbbf24; --pcustom:#34d399;
  --text:#e8edf8; --text2:#b8c4d8; --muted:#5a6a88; --dim:#3a4a68;
  --ff-head:'Outfit',sans-serif; --ff-body:'Instrument Sans',sans-serif; --ff-mono:'JetBrains Mono',monospace;
  --r:12px; --r2:8px;
  --shadow:0 8px 40px rgba(0,0,0,0.6);
  --glow-c:0 0 28px rgba(0,229,200,0.2); --glow-b:0 0 28px rgba(74,158,255,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);
  background-image:linear-gradient(rgba(0,229,200,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,200,0.015) 1px,transparent 1px);
  background-size:40px 40px;}
button{cursor:pointer;font-family:var(--ff-body);border:none;outline:none;}
input,select,textarea{font-family:var(--ff-body);outline:none;}
a{text-decoration:none;}

/* ══ AUTH ══ */
#authScreen{position:fixed;inset:0;z-index:9999;overflow:auto;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
#authScreen::before,#authScreen::after{content:'';position:fixed;border-radius:50%;pointer-events:none;animation:orb 10s ease-in-out infinite;}
#authScreen::before{width:700px;height:700px;background:radial-gradient(circle,rgba(0,229,200,0.055) 0%,transparent 65%);top:-200px;left:-200px;}
#authScreen::after{width:600px;height:600px;background:radial-gradient(circle,rgba(74,158,255,0.04) 0%,transparent 65%);bottom:-150px;right:-150px;animation-delay:-5s;animation-direction:reverse;}
@keyframes orb{0%,100%{transform:scale(1) translate(0,0);}50%{transform:scale(1.12) translate(20px,15px);}}
.auth-card{position:relative;z-index:10;background:linear-gradient(160deg,rgba(17,25,41,0.97) 0%,rgba(10,15,28,0.97) 100%);border:1px solid var(--border2);border-radius:20px;padding:40px 38px;width:100%;max-width:430px;box-shadow:0 40px 100px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06);animation:authIn 0.45s cubic-bezier(0.22,1,0.36,1);}
.auth-card::before{content:'';position:absolute;inset:0;border-radius:20px;pointer-events:none;background:linear-gradient(135deg,rgba(0,229,200,0.04) 0%,transparent 50%);}
@keyframes authIn{from{opacity:0;transform:translateY(24px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
.auth-logo-gem{width:44px;height:44px;background:linear-gradient(135deg,var(--cyan),var(--blue));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--glow-c);}
.auth-logo-text{font-family:var(--ff-head);font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-title{font-family:var(--ff-head);font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.afield{margin-bottom:14px;}
.afield label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.afield input,.afield select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;transition:border-color 0.2s,box-shadow 0.2s;}
.afield input:focus,.afield select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,200,0.1);}
.abtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),var(--blue));border-radius:11px;font-weight:700;font-size:14px;color:#04060e;margin-top:6px;transition:opacity 0.2s,transform 0.1s;position:relative;}
.abtn:hover{opacity:0.92;transform:translateY(-1px);}
.abtn:disabled{opacity:0.5;cursor:not-allowed;}
.alink{background:none;border:none;color:var(--cyan);font-size:12px;font-weight:600;cursor:pointer;width:100%;padding:10px;border-radius:8px;transition:background 0.2s;}
.alink:hover{background:rgba(0,229,200,0.07);}
.alink-g{color:var(--text2);}
.adiv{text-align:center;color:var(--muted);font-size:11px;margin:10px 0;position:relative;}
.adiv::before,.adiv::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border2);}
.adiv::before{left:0;}.adiv::after{right:0;}
.aerr{background:rgba(255,107,122,0.08);border:1px solid rgba(255,107,122,0.25);color:var(--red);padding:9px 12px;border-radius:8px;font-size:12px;margin-top:10px;display:none;}
.aok{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);color:var(--green);padding:9px 12px;border-radius:8px;font-size:12px;margin-top:10px;display:none;}
.pwd-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--lift);transition:width 0.3s,background 0.3s;width:20%;}
.pwd-bar.w{width:50%;background:var(--amber);}
.pwd-bar.m{width:75%;background:var(--blue);}
.pwd-bar.s{width:100%;background:var(--green);}
.spin-xs{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#04060e;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle;margin-right:7px;}
.spin-xs.w{border-color:rgba(255,255,255,0.2);border-top-color:#fff;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ APP SCREEN ══ */
#appScreen{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* ══ TOP NAV — improved ══ */
#topNav{
  display:flex;align-items:center;gap:0;height:54px;min-height:54px;
  background:rgba(7,11,20,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  padding:0 16px;
  position:relative;z-index:100;
  flex-shrink:0;
}
.nav-logo{display:flex;align-items:center;gap:9px;cursor:pointer;margin-right:16px;flex-shrink:0;}
.nav-logo-gem{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(0,229,200,0.25);}
.nav-logo-name{font-family:var(--ff-head);font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-tabs{display:flex;gap:2px;align-items:center;flex:1;}
.page-tab{
  background:none;border:none;color:var(--muted);
  padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;
  transition:all 0.2s;cursor:pointer;white-space:nowrap;
  border:1px solid transparent;
}
.page-tab:hover{color:var(--text2);background:rgba(255,255,255,0.05);}
.page-tab.active{
  color:var(--cyan);background:rgba(0,229,200,0.09);
  border-color:rgba(0,229,200,0.2);
  box-shadow:0 0 16px rgba(0,229,200,0.08);
}
.page-tab.admin-tab{color:var(--amber);display:none;}
.page-tab.admin-tab:hover{background:rgba(255,202,69,0.1);color:var(--amber);}
.page-tab.admin-tab.active{color:var(--amber);background:rgba(255,202,69,0.09);border-color:rgba(255,202,69,0.2);}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.usage-mini{font-size:10px;color:var(--muted);font-family:var(--ff-mono);}
.plan-badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:0.06em;}
.pb-free{background:rgba(148,163,184,0.12);color:var(--pfree);}
.pb-basic{background:rgba(96,165,250,0.12);color:var(--pbasic);}
.pb-standard{background:rgba(192,132,252,0.12);color:var(--pstd);}
.pb-premium{background:rgba(251,191,36,0.12);color:var(--pprem);}
.pb-custom{background:rgba(52,211,153,0.12);color:var(--pcustom);}
.user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 4px;}
.user-av{width:24px;height:24px;background:linear-gradient(135deg,var(--cyan),var(--blue));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#04060e;}
.user-nm{font-size:12px;font-weight:600;color:var(--text2);}
.nvbtn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;transition:all 0.2s;}
.nvbtn:hover{background:rgba(255,107,122,0.1);border-color:rgba(255,107,122,0.3);color:var(--red);}
.nvbtn-logout-text{display:inline;}

/* ══ MOBILE NAV ══ */
#mobileBar{display:none;overflow-x:auto;white-space:nowrap;background:rgba(7,11,20,0.98);border-bottom:1px solid var(--border);padding:0 8px;scrollbar-width:none;flex-shrink:0;}
#mobileBar::-webkit-scrollbar{display:none;}
.mob-tab{display:inline-flex;align-items:center;gap:5px;padding:10px 12px;font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.mob-tab:hover{color:var(--text2);}
.mob-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.mob-tab.admin-mob{color:var(--amber);display:none;}
.mob-tab.admin-mob.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ══ PAGES ══ */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0;}
.page.active{display:flex;}
.page-header{padding:24px 24px 0;flex-shrink:0;}
.page-header h2{font-family:var(--ff-head);font-size:20px;font-weight:700;}
.page-header p{color:var(--muted);font-size:12px;margin-top:4px;}

/* ══ MAP PAGE ══ */
#mapPage{flex-direction:row;flex:1;min-height:0;}
#mainWrap{display:flex;flex:1;overflow:hidden;min-height:0;}
#mapPanel{flex:1;display:flex;flex-direction:column;position:relative;min-width:0;}
#map{flex:1;min-height:0;}
.map-controls-bar{display:flex;gap:8px;align-items:center;padding:8px 10px;background:rgba(7,11,20,0.95);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.nc-group{display:flex;flex-direction:column;gap:2px;}
.nc-group label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.nsel{background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:7px;color:var(--text2);padding:5px 8px;font-size:11px;cursor:pointer;}
.nsel:focus{border-color:var(--cyan);}
#cpill{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,229,200,0.12);border:1px solid rgba(0,229,200,0.3);color:var(--cyan);padding:4px 14px;border-radius:20px;font-size:10px;font-family:var(--ff-mono);display:none;z-index:500;pointer-events:none;}
#famBar{position:absolute;bottom:58px;left:0;right:0;overflow-x:auto;white-space:nowrap;padding:6px 10px;background:rgba(4,6,14,0.85);display:none;z-index:400;scrollbar-width:none;}
#famBar::-webkit-scrollbar{display:none;}
.fi-chip{display:inline-block;padding:3px 10px;margin-right:6px;background:rgba(157,122,255,0.12);border:1px solid rgba(157,122,255,0.2);border-radius:12px;font-size:10px;color:var(--purple);}
#ptip{position:absolute;top:56px;left:10px;background:rgba(7,11,20,0.92);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:11px;display:none;z-index:500;max-width:200px;}
#ptName{font-weight:700;color:var(--text);font-size:13px;}
#ptLoc{color:var(--muted);margin-top:2px;}
#ptLang{color:var(--purple);margin-top:2px;font-size:10px;}
.send-bar{display:flex;gap:8px;align-items:flex-end;padding:8px 10px;background:rgba(7,11,20,0.96);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.mc-group{display:flex;flex-direction:column;gap:3px;}
.mc-group label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.mc-group input{background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;color:var(--text2);padding:6px 10px;font-size:12px;transition:border-color 0.2s;}
.mc-group input:focus{border-color:var(--cyan);}
.mc-country{flex:0 0 130px;}
.mc-question{flex:1;min-width:160px;}
#sendBtn{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#04060e;font-weight:800;font-size:13px;padding:10px 20px;border-radius:10px;transition:all 0.2s;flex-shrink:0;align-self:flex-end;}
#sendBtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,200,0.35);}
#sendBtn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ══ RIGHT PANEL ══ */
#rightPanel{width:360px;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg1);flex-shrink:0;}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.tab{flex:1;padding:10px 4px;background:none;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;border-radius:0;transition:all 0.2s;}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab.ht.on{color:var(--blue);border-bottom-color:var(--blue);}
.tab.ct.on{color:var(--purple);border-bottom-color:var(--purple);}
.tab.pt.on{color:var(--amber);border-bottom-color:var(--amber);}
.tpanel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tpanel.on{display:flex;}
.scroll{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--lift) transparent;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-track{background:transparent;}
.scroll::-webkit-scrollbar-thumb{background:var(--lift);border-radius:2px;}

/* ══ IDLE / LOAD ══ */
.idle{text-align:center;padding:30px 20px;}
.idle-icon{font-size:48px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(0,229,200,0.3));}
.idle h3{font-family:var(--ff-head);font-size:16px;font-weight:700;margin-bottom:8px;}
.idle p{font-size:12px;color:var(--muted);line-height:1.6;}
.usage-widget{margin-top:20px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:14px;}
.uw-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;}
.uw-row{display:flex;justify-content:space-between;font-size:11px;}
.uw-label{color:var(--muted);}
.uw-val{font-family:var(--ff-mono);color:var(--text2);}
.uw-bar{height:3px;background:var(--lift);border-radius:2px;margin:4px 0 10px;overflow:hidden;}
.uw-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:2px;transition:width 0.5s ease;}
.uw-bar-fill.danger{background:linear-gradient(90deg,var(--amber),var(--red));}
.loadbox{display:none;flex-direction:column;align-items:center;padding:40px 20px;gap:16px;}
.spin-lg{width:44px;height:44px;border:3px solid rgba(0,229,200,0.15);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
.lstep{font-size:12px;color:var(--cyan);font-family:var(--ff-mono);}
.pbar{width:180px;height:3px;background:var(--lift);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:2px;transition:width 0.4s ease;width:0%;}
.result-wrap{display:none;}
.ebox{background:rgba(255,107,122,0.07);border:1px solid rgba(255,107,122,0.2);border-radius:10px;padding:16px;font-size:12px;color:var(--red);line-height:1.6;margin-bottom:10px;}
.limit-box{background:rgba(255,202,69,0.06);border:1px solid rgba(255,202,69,0.2);border-radius:12px;padding:20px;text-align:center;}
.lb-icon{font-size:28px;display:block;margin-bottom:10px;}
.lb-title{font-family:var(--ff-head);font-size:15px;font-weight:700;color:var(--amber);margin-bottom:8px;}
.lb-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px;}
.lb-btn{background:rgba(255,202,69,0.12);border:1px solid rgba(255,202,69,0.3);color:var(--amber);padding:9px 20px;border-radius:9px;font-weight:700;font-size:12px;transition:all 0.2s;}
.lb-btn:hover{background:rgba(255,202,69,0.2);}

/* ══ REPORT SECTIONS ══ */
.loc-badge{display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(135deg,rgba(0,229,200,0.07),rgba(74,158,255,0.07));border:1px solid rgba(0,229,200,0.15);border-radius:12px;padding:14px;margin-bottom:10px;}
.loc-name{font-family:var(--ff-head);font-size:16px;font-weight:700;}
.loc-sub{color:var(--muted);font-size:11px;margin-top:3px;}
.loc-lang{color:var(--purple);font-size:10px;margin-top:4px;}
.cbadge{font-family:var(--ff-mono);font-size:9px;color:var(--muted);text-align:right;line-height:1.7;}
.wiki-box{background:rgba(74,158,255,0.05);border:1px solid rgba(74,158,255,0.12);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.epill{background:rgba(0,229,200,0.05);border:1px solid rgba(0,229,200,0.12);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.5;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden;}
.shdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background 0.2s;user-select:none;}
.shdr:hover{background:rgba(255,255,255,0.03);}
.snum{font-family:var(--ff-mono);font-size:10px;color:var(--muted);width:22px;flex-shrink:0;}
.stitle{font-size:12px;font-weight:700;flex:1;}
.chev{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.chev.o{transform:rotate(180deg);}
.sbody{padding:0 14px 12px;border-top:1px solid var(--border3);}
.sbody.hid{display:none;}
.srow{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border3);font-size:11px;}
.srow:last-child{border-bottom:none;}
.slbl{min-width:90px;color:var(--muted);flex-shrink:0;}
.sval{color:var(--text2);line-height:1.5;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin:2px;}
.tp{background:rgba(157,122,255,0.12);color:var(--purple);}
.tb{background:rgba(74,158,255,0.12);color:var(--blue);}
.tg{background:rgba(52,211,153,0.12);color:var(--green);}
.ty{background:rgba(255,202,69,0.12);color:var(--amber);}
.tr{background:rgba(255,107,122,0.12);color:var(--red);}
.tl{padding:6px 0;}
.tli{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border3);}
.tli:last-child{border-bottom:none;}
.tldot{width:8px;height:8px;border-radius:50%;background:var(--cyan);margin-top:3px;flex-shrink:0;}
.tlyear{font-family:var(--ff-mono);font-size:10px;color:var(--cyan);min-width:40px;}
.tltext{font-size:11px;color:var(--text2);line-height:1.5;}
.mcqi{background:rgba(255,255,255,0.025);border-radius:8px;padding:10px;margin-bottom:6px;}
.mcqq{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.mcqo{display:inline-block;padding:4px 10px;margin:3px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:7px;font-size:10px;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.mcqo:hover{border-color:var(--cyan);color:var(--cyan);}
