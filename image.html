<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reunify - Hug Your Past</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      max-width: 300px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>Reunify</h1>
  <p>Meet your past. Hug your future.</p>

  <div class="box">
    <input type="file" id="childImg" accept="image/*">
    <input type="file" id="adultImg" accept="image/*">
    <button onclick="generateImage()">Generate Hug</button>

    <p id="status"></p>
    <img id="output">
  </div>

<script>
const API_KEY = "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";

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}

async function generateImage() {
  const childFile = document.getElementById("childImg").files[0];
  const adultFile = document.getElementById("adultImg").files[0];

  if (!childFile || !adultFile) {
    alert("Please upload both images");
    return;
  }

  document.getElementById("status").innerText = "Generating... Please wait";

  const childBase64 = await fileToBase64(childFile);
  const adultBase64 = await fileToBase64(adultFile);

  const prompt = `
  A realistic emotional scene where the same person as a child and as an adult are hugging each other lovingly, 
  cinematic lighting, highly detailed, photorealistic, emotional moment
  `;

  try {
    const response = await fetch(
      "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-1",
      {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + API_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          inputs: prompt,
          options: { wait_for_model: true }
        })
      }
    );

    const blob = await response.blob();
    const imageUrl = URL.createObjectURL(blob);

    document.getElementById("output").src = imageUrl;
    document.getElementById("status").innerText = "Done!";
  } catch (error) {
    document.getElementById("status").innerText = "Error generating image";
    console.error(error);
  }
}
</script>

</body>
</html>
