<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WordWar — Leaderboard</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><span class="w1">WORD</span><span class="w2">WAR</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link m-show">← Home</a>
    <a href="leaderboard.html" class="nav-link active">Ranks</a>
    <a href="profile.html"     class="nav-link">Profile</a>
    <div class="nav-sep"></div>
    <a href="profile.html" class="user-badge">
      <img class="ub-avatar" id="nav-avatar" src="" alt=""/>
      <span class="ub-name" id="nav-username">…</span>
      <div class="online-dot"></div>
    </a>
  </div>
</nav>

<div class="section-wrap page-enter">
  <div class="section-head">
    <h2 class="section-title">🏅 Global Rankings</h2>
    <div class="flex gap-8">
      <button class="btn btn-sm btn-primary"  onclick="sortBy('score')">By Score</button>
      <button class="btn btn-sm btn-secondary" onclick="sortBy('wins')">By Wins</button>
    </div>
  </div>

  <!-- Podium -->
  <div class="podium-wrap" id="podium"></div>

  <!-- Full list -->
  <div class="lb-list" id="lb-list"><p class="text-muted text-center" style="padding:32px;">Loading…</p></div>
</div>

<div class="ad-banner">
  <iframe id="ad-frame" scrolling="no" title="Ad" style="border:none;width:320px;height:50px;display:block;"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://eduweb-fcfee-default-rtdb.firebaseio.com/'});
var db=firebase.database();

function loadSession(){try{return JSON.parse(localStorage.getItem('ww_user'));}catch(e){return null;}}
var user=loadSession();
if(!user){location.href='login.html';}

function avatarUrl(url,name){
  if(url&&(url.startsWith('http')||url.startsWith('data:')))return url;
  return'https://ui-avatars.com/api/?name='+encodeURIComponent((name||'?').substring(0,2).toUpperCase())+'&background=6d51f5&color=fff&bold=true&size=80';
}
function fmtNum(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}

if(user){
  document.getElementById('nav-username').textContent=user.username;
  document.getElementById('nav-avatar').src=avatarUrl(user.photoURL,user.username);
}

var allPlayers=[];
var currentSort='score';

db.ref('users').on('value',function(snap){
  if(!snap.exists())return;
  allPlayers=Object.entries(snap.val()).filter(function(e){return e[1].username;}).map(function(e){return Object.assign({uid:e[0]},e[1]);});
  render();
});

function sortBy(field){currentSort=field;render();}
window.sortBy=sortBy;

function render(){
  var sorted=allPlayers.slice().sort(function(a,b){return(b[currentSort]||0)-(a[currentSort]||0);});

  /* podium: positions [2nd,1st,3rd] */
  var pod=document.getElementById('podium');
  if(sorted.length>=3){
    var order=[sorted[1],sorted[0],sorted[2]];
    var medals=['🥈','🥇','🥉'];
    var heights=['66px','92px','48px'];
    pod.innerHTML='<div class="podium">'+order.map(function(p,i){
      var rank=i===1?1:(i===0?2:3);
      var isMe=user&&p.username===user.username;
      return '<div class="podium-place'+( isMe?' me':'')+'">'
        +'<div class="pod-medal">'+medals[i]+'</div>'
        +'<img src="'+avatarUrl(p.photoURL,p.username)+'" style="width:44px;height:44px;border-radius:50%;border:2px solid var(--b2);" alt=""/>'
        +'<div class="pod-name">'+p.username+'</div>'
        +'<div class="pod-score">'+fmtNum(p[currentSort]||0)+'</div>'
        +'<div class="pod-base" style="height:'+heights[i]+';background:var(--s2);border-radius:8px 8px 0 0;margin-top:8px;width:80px;"></div>'
        +'</div>';
    }).join('')+'</div>';
  } else { pod.innerHTML=''; }

  /* full list */
  var list=document.getElementById('lb-list');
  if(!sorted.length){list.innerHTML='<p class="text-muted text-center" style="padding:32px;">No players yet.</p>';return;}
  list.innerHTML='<div class="lb-table">'+sorted.map(function(p,i){
    var isMe=user&&p.username===user.username;
    var wr=p.totalGames>0?Math.round((p.wins||0)*100/p.totalGames)+'%':'—';
    return '<div class="lb-row'+(isMe?' me':'')+'">'
      +'<div class="lb-rank">#'+(i+1)+'</div>'
      +'<img src="'+avatarUrl(p.photoURL,p.username)+'" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;" alt=""/>'
      +'<div class="lb-name"><span class="fw-700">'+p.username+'</span>'+(p.isOnline?'<span class="online-dot" style="display:inline-block;margin-left:6px;"></span>':'')+' <span class="text-xs text-faint">Lv.'+(Math.floor((p.score||0)/500)+1)+'</span></div>'
      +'<div class="lb-stats"><span class="text-xs text-muted">'+fmtNum(p.totalGames||0)+' games</span><span class="text-xs">'+wr+' WR</span><span class="text-accent fw-700">'+fmtNum(p.score||0)+' ⭐</span><span class="text-gold fw-700">'+fmtNum(p.wins||0)+' 🏆</span></div>'
      +'</div>';
  }).join('')+'</div>';
}

/* ad */
(function(){
  var f=document.getElementById('ad-frame');if(!f)return;
  var close='<'+'/script>';
  var html='<!DOCTYPE html><html><head><style>*{margin:0;padding:0;}body{background:#0e0e1e;display:flex;align-items:center;justify-content:center;height:50px;overflow:hidden;}</style></head><body>'
    +'<script>var __jscp=function(){for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;if(a=window.parent==window?document.URL:document.referrer){var c=a.indexOf("://");0<=c&&(a=a.substring(c+3));c=a.indexOf("/");0<=c&&(a=a.substring(0,c))}var b={pu:a,"if":b,rn:new Number(Math.floor(99999999*Math.random())+1)},a=[],d;for(d in b)a.push(d+"="+encodeURIComponent(b[d]));return encodeURIComponent(a.join("&"))};document.write(\'<sc\'+\'ript src="//cpm.ezmob.com/tag?zone_id=338024&size=320x50&subid=&j=\'+__jscp()+\'"><\\/sc\'+\'ript>\');'
    +close+'</body></html>';
  if('srcdoc'in f){f.srcdoc=html;}else{var b=new Blob([html],{type:'text/html'});f.src=URL.createObjectURL(b);}
})();
</script>
</body>
</html>
