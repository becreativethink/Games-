<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#6d51f5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WordWar"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png"/>
<title>WordWar — Leaderboard</title>

<script src='//static.qualiclicks.com/tabu/display.js'></script>

<style>
/* ══ BASE ══ */
body { background: var(--bg); }

/* ══ PAGE HEADER ══ */
.lb-page-header {
  text-align: center;
  padding: 20px 20px 6px;
}
.lb-page-title {
  font-family: var(--font-display);
  font-size: 1.45rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  background: linear-gradient(135deg, #fff 30%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 3px;
}
.lb-page-sub {
  font-size: 0.7rem;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ══ SORT TABS ══ */
.sort-tabs {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 12px 20px 0;
}
.sort-tab {
  padding: 7px 18px;
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: var(--font);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid var(--b2);
  background: rgba(255,255,255,0.04);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.18s;
}
.sort-tab.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 0 18px rgba(109,81,245,0.45);
}

/* ══ MY RANK PILL ══ */
.my-rank-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 10px auto 0;
  max-width: 220px;
  padding: 7px 16px;
  background: rgba(109,81,245,0.1);
  border: 1px solid rgba(109,81,245,0.3);
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #b0a0ff;
}

/* ══ PODIUM ══ */
.podium-section {
  padding: 20px 12px 0;
  max-width: 420px;
  margin: 0 auto;
}
.podium-stage {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 6px;
}
.pod-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  max-width: 120px;
}
.pod-avatar-wrap {
  position: relative;
  margin-bottom: 6px;
}
.pod-avatar {
  border-radius: 50%;
  object-fit: cover;
  display: block;
}
.pod-slot.rank-1 .pod-avatar {
  width: 64px; height: 64px;
  border: 3px solid #f0b429;
  box-shadow: 0 0 24px rgba(240,180,41,0.55), 0 0 8px rgba(240,180,41,0.3);
}
.pod-slot.rank-2 .pod-avatar {
  width: 50px; height: 50px;
  border: 2px solid #a0aec0;
  box-shadow: 0 0 14px rgba(160,174,192,0.35);
}
.pod-slot.rank-3 .pod-avatar {
  width: 46px; height: 46px;
  border: 2px solid #c97c2e;
  box-shadow: 0 0 14px rgba(201,124,46,0.35);
}
.pod-crown {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.3rem;
  filter: drop-shadow(0 2px 8px rgba(240,180,41,0.8));
}
.pod-medal-badge {
  position: absolute;
  bottom: -5px;
  right: -5px;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 900;
  font-family: var(--mono);
  border: 2px solid var(--bg);
}
.rank-1 .pod-medal-badge { background: #f0b429; color: #000; }
.rank-2 .pod-medal-badge { background: #a0aec0; color: #000; }
.rank-3 .pod-medal-badge { background: #c97c2e; color: #fff; }

.pod-name {
  font-size: 0.7rem;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  max-width: 88px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 3px;
}
.pod-val {
  font-family: var(--mono);
  font-size: 0.66rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.rank-1 .pod-val { color: #f0b429; }
.rank-2 .pod-val { color: #a0aec0; }
.rank-3 .pod-val { color: #c97c2e; }

/* Podium base columns — solid visible fills */
.pod-base {
  width: 100%;
  border-radius: 10px 10px 0 0;
}
.rank-1 .pod-base {
  height: 72px;
  background: linear-gradient(180deg, rgba(240,180,41,0.30) 0%, rgba(240,180,41,0.08) 100%);
  border: 1px solid rgba(240,180,41,0.40);
  border-bottom: none;
  box-shadow: inset 0 1px 0 rgba(240,180,41,0.3);
}
.rank-2 .pod-base {
  height: 50px;
  background: linear-gradient(180deg, rgba(160,174,192,0.22) 0%, rgba(160,174,192,0.06) 100%);
  border: 1px solid rgba(160,174,192,0.28);
  border-bottom: none;
}
.rank-3 .pod-base {
  height: 36px;
  background: linear-gradient(180deg, rgba(201,124,46,0.22) 0%, rgba(201,124,46,0.06) 100%);
  border: 1px solid rgba(201,124,46,0.28);
  border-bottom: none;
}

.pod-me-tag {
  font-size: 0.52rem;
  background: var(--accent);
  color: #fff;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 700;
  margin-bottom: 2px;
  letter-spacing: 0.05em;
}

/* ══ SEARCH ══ */
.lb-search-wrap {
  max-width: 560px;
  margin: 14px auto 0;
  padding: 0 14px;
  position: relative;
}
.lb-search {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--b2);
  border-radius: 12px;
  padding: 10px 14px 10px 38px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  box-sizing: border-box;
  transition: border-color 0.18s;
}
.lb-search:focus { outline: none; border-color: var(--accent); }
.lb-search-icon {
  position: absolute;
  left: 26px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
  pointer-events: none;
}

/* ══ PLAYER LIST ══ */
.lb-list-section {
  max-width: 560px;
  margin: 0 auto;
  padding: 10px 14px 110px;
}
.lb-card {
  display: grid;
  grid-template-columns: 32px 42px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 11px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--b1);
  border-radius: 14px;
  margin-bottom: 7px;
  transition: border-color 0.18s, background 0.18s;
}
.lb-card:active { background: rgba(255,255,255,0.07); }
.lb-card.me {
  background: rgba(109,81,245,0.09);
  border-color: rgba(109,81,245,0.38);
  box-shadow: 0 0 18px rgba(109,81,245,0.13);
}
.lb-card.top3 { border-color: var(--b2); }

.lb-num {
  font-family: var(--mono);
  font-size: 0.82rem;
  font-weight: 700;
  text-align: center;
  color: var(--text3);
  line-height: 1;
}
.lb-num.gold   { color: #f0b429; font-size: 1rem; }
.lb-num.silver { color: #a0aec0; font-size: 1rem; }
.lb-num.bronze { color: #c97c2e; font-size: 1rem; }

.lb-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--b2);
  flex-shrink: 0;
}
.lb-info { min-width: 0; }
.lb-uname {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lb-level {
  font-size: 0.58rem;
  background: rgba(109,81,245,0.15);
  color: #b0a0ff;
  padding: 1px 5px;
  border-radius: 5px;
  font-weight: 600;
  border: 1px solid rgba(109,81,245,0.22);
  flex-shrink: 0;
}
.lb-meta {
  display: flex;
  gap: 6px;
  font-size: 0.62rem;
  color: var(--text3);
}
.lb-meta span { display: flex; align-items: center; gap: 2px; }

.lb-right { text-align: right; flex-shrink: 0; }
.lb-primary-val {
  font-family: var(--mono);
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  display: block;
  white-space: nowrap;
}
.lb-secondary-val {
  font-size: 0.62rem;
  color: var(--text3);
  display: block;
  margin-top: 2px;
  white-space: nowrap;
}

/* ══ LOADING SKELETONS ══ */
.lb-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
  font-size: 0.85rem;
}
.lb-loading-row {
  height: 64px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--b1);
  border-radius: 14px;
  margin-bottom: 7px;
  animation: lb-shimmer 1.4s ease-in-out infinite;
}
@keyframes lb-shimmer {
  0%,100% { opacity: 0.4; }
  50%      { opacity: 0.8; }
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="navbar">
  <a href="index.html" class="nav-logo"><span class="w1">WORD</span><span class="w2">WAR</span></a>
  <div class="nav-links">
    <div class="nav-sep"></div>
    <a href="profile.html" class="user-badge">
      <img class="ub-avatar" id="nav-avatar" src="" alt=""/>
      <span class="ub-name" id="nav-username">…</span>
      <div class="online-dot"></div>
    </a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="lb-page-header">
  <div class="lb-page-title">🏆 GLOBAL RANKINGS</div>
  <div class="lb-page-sub">LIVE LEADERBOARD · ALL PLAYERS</div>
</div>

<!-- SORT TABS -->
<div class="sort-tabs">
  <button class="sort-tab active" id="tab-score" onclick="sortBy('score')">⭐ Score</button>
  <button class="sort-tab" id="tab-wins"  onclick="sortBy('wins')">🏆 Wins</button>
  <button class="sort-tab" id="tab-money" onclick="sortBy('money')">💰 Money</button>
</div>

<!-- MY RANK PILL -->
<div class="my-rank-pill" id="my-rank-pill" style="display:none;">
  <span>👤</span><span id="my-rank-text">Your rank: —</span>
</div>

<!-- PODIUM -->
<div class="podium-section">
  <div class="podium-stage" id="podium-stage">
    <!-- skeleton -->
    <div class="pod-slot rank-2"><div class="pod-base" style="height:56px;background:var(--s1);border-radius:10px 10px 0 0;width:100%;"></div></div>
    <div class="pod-slot rank-1"><div class="pod-base" style="height:80px;background:var(--s1);border-radius:10px 10px 0 0;width:100%;"></div></div>
    <div class="pod-slot rank-3"><div class="pod-base" style="height:40px;background:var(--s1);border-radius:10px 10px 0 0;width:100%;"></div></div>
  </div>
</div>

<!-- SEARCH -->
<div class="lb-search-wrap">
  <span class="lb-search-icon">🔍</span>
  <input class="lb-search" id="lb-search" placeholder="Search player…" oninput="filterList()" autocomplete="off"/>
</div>

<!-- PLAYER LIST -->
<div class="lb-list-section">
  <div id="lb-list">
    <div class="lb-loading-row"></div>
    <div class="lb-loading-row"></div>
    <div class="lb-loading-row"></div>
    <div class="lb-loading-row"></div>
    <div class="lb-loading-row"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bn-btn" onclick="location.href='index.html'"><span class="bn-icon">🏠</span><span class="bn-lbl">Home</span></button>
  <button class="bn-btn active"><span class="bn-icon">🏆</span><span class="bn-lbl">Ranks</span></button>
  <button class="bn-btn" onclick="location.href='friends.html'"><span class="bn-icon">👥</span><span class="bn-lbl">Friends</span></button>
  <button class="bn-btn" onclick="location.href='profile.html'"><span class="bn-icon">👤</span><span class="bn-lbl">Profile</span></button>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://eduweb-fcfee-default-rtdb.firebaseio.com/'});
var db = firebase.database();

function loadSession(){try{return JSON.parse(localStorage.getItem('ww_user'));}catch(e){return null;}}
var user = loadSession();
if(!user){ location.href='login.html'; }

function avatarUrl(url,name){
  if(url&&(url.startsWith('http')||url.startsWith('data:')))return url;
  return'https://ui-avatars.com/api/?name='+encodeURIComponent((name||'?').substring(0,2).toUpperCase())+'&background=6d51f5&color=fff&bold=true&size=80';
}
function fmtNum(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
function calcLevel(xp){
  var XP_LVS=[0,100,250,500,900,1400,2000,2800,3800,5000];
  var lvl=1;
  for(var i=0;i<XP_LVS.length;i++){if((xp||0)>=XP_LVS[i])lvl=i+1;}
  return lvl;
}

if(user){
  document.getElementById('nav-username').textContent = user.username||'…';
  document.getElementById('nav-avatar').src = avatarUrl(user.photoURL, user.username);
}

var allPlayers  = [];
var currentSort = 'score';
var _dbListener = null;

/* ── Show error state ── */
function showError(msg){
  document.getElementById('lb-list').innerHTML =
    '<div class="lb-empty">⚠️ '+msg+'<br><br>'
    +'<button onclick="loadData()" style="margin-top:8px;padding:8px 20px;border-radius:10px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:700;">Retry</button>'
    +'</div>';
  document.getElementById('podium-stage').innerHTML =
    '<div style="text-align:center;color:var(--text3);font-size:.8rem;padding:20px;">—</div>';
}

/* ── Load data ── */
function loadData(){
  // Show skeletons while loading
  var list = document.getElementById('lb-list');
  list.innerHTML = [1,2,3,4,5].map(function(){
    return '<div class="lb-loading-row"></div>';
  }).join('');

  // Detach old listener if any
  if(_dbListener){ db.ref('users').off('value', _dbListener); }

  _dbListener = function(snap){
    if(!snap.exists()){
      showError('No players found yet.');
      return;
    }
    try{
      allPlayers = [];
      snap.forEach(function(child){
        var d = child.val();
        if(d && d.username){
          allPlayers.push(Object.assign({uid: child.key}, d));
        }
      });
      render();
    }catch(e){
      showError('Error loading data. Please retry.');
    }
  };

  db.ref('users').on('value', _dbListener, function(error){
    // Firebase permission/index error handler
    showError('Could not load leaderboard: ' + (error.message || 'Permission denied'));
  });
}

/* ── Sort tabs ── */
window.sortBy = function(field){
  currentSort = field;
  ['score','wins','money'].forEach(function(f){
    document.getElementById('tab-'+f).classList.toggle('active', f===field);
  });
  render();
};

/* ── Search filter ── */
window.filterList = function(){ render(); };

/* ── Render ── */
function render(){
  var q = (document.getElementById('lb-search').value||'').toLowerCase().trim();

  var sorted = allPlayers.slice().sort(function(a,b){
    return (b[currentSort]||0) - (a[currentSort]||0);
  });

  /* My rank pill */
  var myIdx = user ? sorted.findIndex(function(p){ return p.uid===user.uid || p.username===user.username; }) : -1;
  var pill = document.getElementById('my-rank-pill');
  if(myIdx >= 0){
    pill.style.display = 'flex';
    document.getElementById('my-rank-text').textContent = 'Your rank: #'+(myIdx+1)+' of '+sorted.length;
  }

  renderPodium(sorted);

  var filtered = q ? sorted.filter(function(p){
    return p.username.toLowerCase().includes(q);
  }) : sorted;

  renderList(filtered, sorted);
}

function renderPodium(sorted){
  var stage = document.getElementById('podium-stage');
  if(!sorted.length){ stage.innerHTML=''; return; }

  // Order: 2nd, 1st, 3rd  (visual podium layout)
  var slots = [
    { player: sorted[1]||null, rank: 2 },
    { player: sorted[0]||null, rank: 1 },
    { player: sorted[2]||null, rank: 3 }
  ];

  stage.innerHTML = slots.map(function(s){
    if(!s.player){
      return '<div class="pod-slot rank-'+s.rank+'"><div class="pod-base"></div></div>';
    }
    var p    = s.player;
    var isMe = user && (p.uid===user.uid || p.username===user.username);
    var icon = currentSort==='score'?'⭐':currentSort==='wins'?'🏆':'💰';
    var val  = icon+' '+fmtNum(p[currentSort]||0);
    return '<div class="pod-slot rank-'+s.rank+'">'
      + (isMe ? '<div class="pod-me-tag">YOU</div>' : '')
      + '<div class="pod-avatar-wrap">'
      +   (s.rank===1 ? '<div class="pod-crown">👑</div>' : '')
      +   '<img class="pod-avatar" src="'+avatarUrl(p.photoURL,p.username)+'" alt=""/>'
      +   '<div class="pod-medal-badge">'+s.rank+'</div>'
      + '</div>'
      + '<div class="pod-name">'+escHtml(p.username)+'</div>'
      + '<div class="pod-val">'+val+'</div>'
      + '<div class="pod-base"></div>'
      + '</div>';
  }).join('');
}

function renderList(filtered, sorted){
  var list = document.getElementById('lb-list');
  if(!filtered.length){
    list.innerHTML = '<div class="lb-empty">😶 No players found.</div>';
    return;
  }

  list.innerHTML = filtered.map(function(p){
    var globalRank = sorted.findIndex(function(x){ return x.uid===p.uid; }) + 1;
    var isMe   = user && (p.uid===user.uid || p.username===user.username);
    var isTop  = globalRank <= 3;
    var wr     = p.totalGames > 0 ? Math.round((p.wins||0)*100/p.totalGames)+'%' : '—';
    var lvl    = calcLevel(p.xp);

    var numClass  = 'lb-num';
    var rankLabel = '#'+globalRank;
    if(globalRank===1){ numClass+=' gold';   rankLabel='🥇'; }
    else if(globalRank===2){ numClass+=' silver'; rankLabel='🥈'; }
    else if(globalRank===3){ numClass+=' bronze'; rankLabel='🥉'; }

    var primaryIcon = currentSort==='score'?'⭐':currentSort==='wins'?'🏆':'💰';
    var primaryVal  = primaryIcon+' '+fmtNum(p[currentSort]||0);
    var secondaryVal = currentSort==='score'
      ? fmtNum(p.wins||0)+' wins'
      : fmtNum(p.score||0)+' pts';

    return '<div class="lb-card'+(isMe?' me':'')+(isTop?' top3':'')+'" onclick="viewProfile(\''+escHtml(p.username)+'\')" style="cursor:pointer;">'
      + '<div class="'+numClass+'">'+rankLabel+'</div>'
      + '<img class="lb-avatar" src="'+avatarUrl(p.photoURL,p.username)+'" alt=""/>'
      + '<div class="lb-info">'
      +   '<div class="lb-uname">'
      +     escHtml(p.username)
      +     (p.isOnline ? '<span class="online-dot" style="display:inline-block;"></span>' : '')
      +     '<span class="lb-level">Lv.'+lvl+'</span>'
      +   '</div>'
      +   '<div class="lb-meta">'
      +     '<span>🎮 '+fmtNum(p.totalGames||0)+'</span>'
      +     '<span>📈 '+wr+'</span>'
      +   '</div>'
      + '</div>'
      + '<div class="lb-right">'
      +   '<span class="lb-primary-val">'+primaryVal+'</span>'
      +   '<span class="lb-secondary-val">'+secondaryVal+'</span>'
      + '</div>'
      + '</div>';
  }).join('');
}

function escHtml(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.viewProfile = function(username){
  if(user && username === user.username) location.href = 'profile.html';
  else location.href = 'pubprofile.html?u=' + encodeURIComponent(username);
};

/* ── Qualiclicks Pop Ad ── */
var _popFired = false;
document.addEventListener('click', function(){
  if(_popFired) return;
  _popFired = true;
  try{
    window.adk_pdisp = {'h':'xml.qualiclicks.com','f':49886,'a':'','ps':[5],'cin':4,'s':'','q':[],'t':6};
    if(typeof adk_disp==='function') adk_disp();
    else if(typeof window.adk_run==='function') window.adk_run();
  }catch(e){}
}, {once:false});

// Boot
loadData();
</script>

<script src="/pwa.js"></script>
</body>
</html>
