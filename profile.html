<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#6d51f5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WordWar"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
<title>WordWar — Profile</title>
<link rel="stylesheet" href="style.css"/>
<style>
.prof-hero{position:relative;background:linear-gradient(160deg,rgba(109,81,245,.22) 0%,rgba(180,76,255,.1) 55%,rgba(61,232,255,.07) 100%);border-bottom:1px solid rgba(109,81,245,.18);padding:36px 20px 24px;text-align:center;overflow:hidden;}
.prof-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 90% at 50% 0%,rgba(109,81,245,.18) 0%,transparent 70%);pointer-events:none;}
.prof-avatar-ring{position:relative;display:inline-block;margin-bottom:14px;}
.prof-avatar-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));z-index:0;animation:rp 3s ease-in-out infinite;}
@keyframes rp{0%,100%{opacity:.7;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
.prof-avatar-img{position:relative;z-index:1;width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--bg);display:block;}
.prof-name{font-family:var(--font-display);font-size:1.3rem;font-weight:800;letter-spacing:.04em;color:#fff;margin-bottom:8px;}
.prof-tags{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.ptag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.05em;}
.ptag-lv{background:rgba(109,81,245,.2);color:#b0a0ff;border:1px solid rgba(109,81,245,.35);}
.ptag-on{background:rgba(22,194,106,.15);color:#16c26a;border:1px solid rgba(22,194,106,.3);}
.ptag-off{background:rgba(120,120,160,.12);color:#7878a0;border:1px solid rgba(120,120,160,.2);}

.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.06);border-radius:16px;overflow:hidden;margin:20px 16px 16px;border:1px solid rgba(255,255,255,.06);}
.pstat{background:rgba(255,255,255,.03);padding:14px 8px;text-align:center;transition:background .15s;}
.pstat:active{background:rgba(255,255,255,.07);}
.pstat-icon{font-size:1.05rem;display:block;margin-bottom:3px;}
.pstat-val{font-family:var(--mono);font-size:1.2rem;font-weight:700;display:block;margin-bottom:3px;}
.pstat-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}

.prof-lvl{margin:0 16px 16px;padding:14px 16px;background:rgba(109,81,245,.07);border:1px solid rgba(109,81,245,.18);border-radius:14px;}
.prof-lvl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.prof-lvl-lbl{font-size:.78rem;font-weight:700;color:#b0a0ff;}
.prof-lvl-xp{font-size:.7rem;color:var(--text3);font-family:var(--mono);}
.prof-lvl-bar{height:7px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;}
.prof-lvl-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .8s cubic-bezier(.22,1,.36,1);box-shadow:0 0 10px rgba(109,81,245,.5);}

.prof-sec{margin:0 16px 16px;}
.prof-sec-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px;padding-left:2px;}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ach-card{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;border:1px solid var(--b1);background:rgba(255,255,255,.03);transition:all .18s;}
.ach-card.earned{background:rgba(109,81,245,.08);border-color:rgba(109,81,245,.28);}
.ach-ic{font-size:1.35rem;flex-shrink:0;filter:grayscale(1) opacity(.3);}
.ach-card.earned .ach-ic{filter:none;}
.ach-nm{font-size:.75rem;font-weight:700;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ach-card.earned .ach-nm{color:#b0a0ff;}
.ach-st{font-size:.58rem;color:var(--text3);}
.ach-card.earned .ach-st{color:#16c26a;}

.prof-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 16px;}
.pact{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 10px;border-radius:12px;border:1px solid var(--b1);background:rgba(255,255,255,.03);cursor:pointer;font-family:var(--font);font-size:.7rem;font-weight:600;color:var(--text2);transition:all .18s;}
.pact:hover{background:rgba(255,255,255,.07);border-color:var(--b2);color:var(--text);}
.pact .pi{font-size:1.4rem;}
.pact.danger{border-color:rgba(240,64,96,.2);color:#f04060;}
.pact.danger:hover{background:rgba(240,64,96,.08);border-color:rgba(240,64,96,.35);}
.pact.full{grid-column:1/-1;flex-direction:row;justify-content:center;gap:8px;padding:13px;}
.prof-pad{height:calc(88px + env(safe-area-inset-bottom));}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><span class="w1">WORD</span><span class="w2">WAR</span></a>
  <div class="nav-links"><a href="index.html" class="nav-link m-show">← HOME</a></div>
</nav>

<div class="prof-hero">
  <div class="prof-avatar-ring">
    <img id="prof-avatar" src="" alt="" class="prof-avatar-img"/>
  </div>
  <div class="prof-name" id="prof-name">…</div>
  <div class="prof-tags">
    <span class="ptag ptag-lv" id="prof-level">Lv. 1</span>
    <span class="ptag ptag-on" id="prof-online">● Online</span>
  </div>
</div>

<div class="prof-stats">
  <div class="pstat"><span class="pstat-icon">⭐</span><span class="pstat-val text-accent" id="prof-score">0</span><span class="pstat-lbl">Score</span></div>
  <div class="pstat"><span class="pstat-icon">💰</span><span class="pstat-val text-gold"   id="prof-money">0</span><span class="pstat-lbl">Money</span></div>
  <div class="pstat"><span class="pstat-icon">🏆</span><span class="pstat-val"             id="prof-wins">0</span> <span class="pstat-lbl">Wins</span></div>
  <div class="pstat"><span class="pstat-icon">🎮</span><span class="pstat-val"             id="prof-games">0</span><span class="pstat-lbl">Games</span></div>
  <div class="pstat"><span class="pstat-icon">📈</span><span class="pstat-val"             id="prof-wr">0%</span> <span class="pstat-lbl">Win Rate</span></div>
  <div class="pstat"><span class="pstat-icon">🔥</span><span class="pstat-val"             id="prof-streak">0</span><span class="pstat-lbl">Streak</span></div>
</div>

<div class="prof-lvl">
  <div class="prof-lvl-hdr">
    <span class="prof-lvl-lbl">⚡ Level <span id="lv-cur">1</span></span>
    <span class="prof-lvl-xp"><span id="lv-xp">0</span> / 500 XP</span>
  </div>
  <div class="prof-lvl-bar"><div class="prof-lvl-fill" id="lv-fill" style="width:0%"></div></div>
</div>

<div class="prof-sec">
  <div class="prof-sec-lbl">🏅 Achievements</div>
  <div class="ach-grid" id="ach-grid"></div>
  <a href="achievements.html" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:10px;background:rgba(109,81,245,0.08);border:1px solid rgba(109,81,245,0.2);border-radius:12px;font-size:.78rem;font-weight:700;color:#b0a0ff;text-decoration:none;transition:all .16s;" onmouseover="this.style.background='rgba(109,81,245,0.15)'" onmouseout="this.style.background='rgba(109,81,245,0.08)'">
    🏅 View All Achievements →
  </a>
</div>

<div class="prof-sec">
  <div class="prof-sec-lbl">📜 Match History</div>
  <a href="history.html" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:12px;font-size:.78rem;font-weight:700;color:var(--text2);text-decoration:none;transition:all .16s;" onmouseover="this.style.background='rgba(255,255,255,0.07)'" onmouseout="this.style.background='rgba(255,255,255,0.04)'">
    📜 View Match History →
  </a>
</div>

<div class="prof-sec">
  <div class="prof-sec-lbl">⚙️ Account</div>
  <div class="prof-actions">
    <button class="pact" onclick="changePhoto()"><span class="pi">📷</span>Change Photo</button>
    <button class="pact danger" onclick="deleteAccount()"><span class="pi">🗑️</span>Delete Account</button>
    <button class="pact full" onclick="doLogout()"><span class="pi">🚪</span>Logout</button>
  </div>
</div>
<div class="prof-pad"></div>

<nav class="bottom-nav">
  <button class="bn-btn" onclick="location.href='index.html'"><span class="bn-icon">🏠</span><span class="bn-lbl">Home</span></button>
  <button class="bn-btn" onclick="location.href='leaderboard.html'"><span class="bn-icon">🏆</span><span class="bn-lbl">Ranks</span></button>
  <button class="bn-btn" onclick="location.href='friends.html'"><span class="bn-icon">👥</span><span class="bn-lbl">Friends</span></button>
  <button class="bn-btn active"><span class="bn-icon">👤</span><span class="bn-lbl">Profile</span></button>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://eduweb-fcfee-default-rtdb.firebaseio.com/'});
var db=firebase.database();
function loadSession(){try{return JSON.parse(localStorage.getItem('ww_user'));}catch(e){return null;}}
function saveSession(u){localStorage.setItem('ww_user',JSON.stringify(u));}
var user=loadSession();
if(!user){location.href='login.html';}
function avatarUrl(url,name){if(url&&(url.startsWith('http')||url.startsWith('data:')))return url;return'https://ui-avatars.com/api/?name='+encodeURIComponent((name||'?').substring(0,2).toUpperCase())+'&background=6d51f5&color=fff&bold=true&size=80';}
function fmtNum(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
var ACH=[
  {id:'first_win',icon:'🏆',label:'First Victory',desc:'Win your first game',cond:function(u){return(u.wins||0)>=1;}},
  {id:'ten_wins',icon:'⚔️',label:'Veteran',desc:'Win 10 games',cond:function(u){return(u.wins||0)>=10;}},
  {id:'daily_hero',icon:'📅',label:'Daily Warrior',desc:'Play daily challenge',cond:function(u){return(u.totalGames||0)>=1;}},
  {id:'score_500',icon:'💰',label:'Score Hunter',desc:'Reach 500 score',cond:function(u){return(u.score||0)>=500;}},
  {id:'score_2k',icon:'👑',label:'Elite Player',desc:'Reach 2000 score',cond:function(u){return(u.score||0)>=2000;}},
  {id:'games_50',icon:'🎮',label:'Dedicated',desc:'Play 50 games',cond:function(u){return(u.totalGames||0)>=50;}},
  {id:'streak_3',icon:'🔥',label:'On Fire',desc:'3-game win streak',cond:function(u){return(u.winStreak||0)>=3;}},
];
function fillUI(u){
  document.getElementById('prof-avatar').src=avatarUrl(u.photoURL,u.username);
  document.getElementById('prof-name').textContent=u.username||'…';
  document.getElementById('prof-score').textContent=fmtNum(u.score||0);
  document.getElementById('prof-money').textContent=fmtNum(u.money||0);
  document.getElementById('prof-wins').textContent=fmtNum(u.wins||0);
  document.getElementById('prof-games').textContent=fmtNum(u.totalGames||0);
  document.getElementById('prof-wr').textContent=u.totalGames>0?Math.round((u.wins||0)*100/u.totalGames)+'%':'0%';
  document.getElementById('prof-streak').textContent=u.winStreak||0;
  var lvl=Math.floor((u.score||0)/500)+1,xp=(u.score||0)%500;
  document.getElementById('prof-level').textContent='Lv. '+lvl;
  document.getElementById('lv-cur').textContent=lvl;
  document.getElementById('lv-xp').textContent=xp;
  document.getElementById('lv-fill').style.width=(xp/500*100).toFixed(1)+'%';
  var ot=document.getElementById('prof-online');
  ot.textContent=u.isOnline?'● Online':'○ Offline';
  ot.className='ptag '+(u.isOnline?'ptag-on':'ptag-off');
  document.getElementById('ach-grid').innerHTML=ACH.map(function(a){
    var e=a.cond(u);
    return'<div class="ach-card'+(e?' earned':'')+'">'
      +'<span class="ach-ic">'+a.icon+'</span>'
      +'<div><span class="ach-nm">'+a.label+'</span><span class="ach-st">'+(e?'✓ Unlocked':'🔒 '+a.desc)+'</span></div>'
      +'</div>';
  }).join('');
}
if(user){fillUI(user);db.ref('users/'+user.uid).get().then(function(snap){if(snap.exists()){var f=Object.assign({uid:user.uid},snap.val());saveSession(f);fillUI(f);}}).catch(function(){});}
window.doLogout=async function(){if(user&&user.uid){try{await db.ref('users/'+user.uid).update({isOnline:false});}catch(e){}}localStorage.removeItem('ww_user');sessionStorage.removeItem('ww_mode');location.href='login.html';};
window.changePhoto=async function(){var url=prompt('Enter new photo URL:');if(!url||!url.startsWith('http')){alert('Please enter a valid URL starting with http');return;}await db.ref('users/'+user.uid).update({photoURL:url});var s=await db.ref('users/'+user.uid).get();var f=Object.assign({uid:user.uid},s.val());saveSession(f);fillUI(f);};
window.deleteAccount=async function(){if(!confirm('Delete your account permanently?'))return;if(!confirm('Are you absolutely sure?'))return;await db.ref('users/'+user.uid).remove();await db.ref('usernames/'+user.username.toLowerCase()).remove();localStorage.removeItem('ww_user');sessionStorage.removeItem('ww_mode');location.href='login.html';};
function selectDailyMode(){if(!loadSession()){location.href='login.html';return;}sessionStorage.setItem('ww_mode','daily');location.href='game.html';}
</script>
<script src="/pwa.js"></script>
</body>
</html>
