<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#6d51f5"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WordWar"/>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png"/>
<title>WordWar — Profile</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo"><span class="w1">WORD</span><span class="w2">WAR</span></a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link m-show">← Home</a>
    <a href="leaderboard.html" class="nav-link">Ranks</a>
    <a href="profile.html"     class="nav-link active">Profile</a>
    <div class="nav-sep"></div>
    <button class="nav-link" onclick="doLogout()">Logout</button>
  </div>
</nav>

<div class="section-wrap page-enter">
  <div class="profile-header">
    <div style="position:relative;display:inline-block;">
      <img id="prof-avatar" src="" alt="" style="width:84px;height:84px;border-radius:50%;border:3px solid var(--b2);display:block;"/>
    </div>
    <div class="profile-info">
      <h2 id="prof-name">…</h2>
      <div class="flex gap-8 flex-wrap mt-4">
        <span class="tag tag-purple" id="prof-level">Lv. 1</span>
        <span class="tag" id="prof-online" style="background:rgba(22,194,106,0.12);color:#16c26a;border-color:rgba(22,194,106,0.25);">● Online</span>
      </div>
      <div class="flex gap-16 mt-12">
        <div><div class="text-mono fw-700 text-accent" id="prof-score">0</div><div class="text-xs text-muted">Score</div></div>
        <div><div class="text-mono fw-700 text-gold"   id="prof-money">0</div><div class="text-xs text-muted">Money</div></div>
        <div><div class="text-mono fw-700"             id="prof-wins">0</div><div class="text-xs text-muted">Wins</div></div>
      </div>
    </div>
  </div>

  <div class="level-bar-wrap mt-16">
    <div class="flex justify-between text-xs text-muted mb-4">
      <span>Level <span id="lv-cur">1</span></span>
      <span><span id="lv-xp">0</span> / 500 XP to next</span>
    </div>
    <div class="level-bar"><div class="level-fill" id="lv-fill" style="width:0%"></div></div>
  </div>

  <div class="divider mt-20"></div>
  <h3 class="mt-16 mb-12">Achievements</h3>
  <div class="badges-strip" id="badges"></div>

  <div class="divider mt-20"></div>
  <h3 class="mt-16 mb-12">Actions</h3>
  <div class="flex gap-8 flex-wrap">
    <button class="btn btn-secondary" onclick="changePhoto()">📷 Change Photo URL</button>
    <button class="btn btn-danger"    onclick="deleteAccount()">🗑 Delete Account</button>
    <button class="btn btn-ghost"     onclick="doLogout()">← Logout</button>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://eduweb-fcfee-default-rtdb.firebaseio.com/'});
var db=firebase.database();

function loadSession(){try{return JSON.parse(localStorage.getItem('ww_user'));}catch(e){return null;}}
function saveSession(u){localStorage.setItem('ww_user',JSON.stringify(u));}
var user=loadSession();
if(!user){location.href='login.html';}

function avatarUrl(url,name){
  if(url&&(url.startsWith('http')||url.startsWith('data:')))return url;
  return'https://ui-avatars.com/api/?name='+encodeURIComponent((name||'?').substring(0,2).toUpperCase())+'&background=6d51f5&color=fff&bold=true&size=80';
}
function fmtNum(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}

var ACHIEVEMENTS=[
  {id:'first_win',icon:'🏆',label:'First Victory',cond:function(u){return(u.wins||0)>=1;}},
  {id:'ten_wins',icon:'⚔️',label:'Veteran',cond:function(u){return(u.wins||0)>=10;}},
  {id:'daily_hero',icon:'📅',label:'Daily Warrior',cond:function(u){return(u.totalGames||0)>=1;}},
  {id:'score_500',icon:'💰',label:'Score Hunter',cond:function(u){return(u.score||0)>=500;}},
  {id:'score_2k',icon:'👑',label:'Elite Player',cond:function(u){return(u.score||0)>=2000;}},
  {id:'games_50',icon:'🎮',label:'Dedicated',cond:function(u){return(u.totalGames||0)>=50;}},
  {id:'streak_3',icon:'🔥',label:'On Fire',cond:function(u){return(u.winStreak||0)>=3;}},
];

function fillUI(u){
  document.getElementById('prof-avatar').src=avatarUrl(u.photoURL,u.username);
  document.getElementById('prof-name').textContent=u.username||'…';
  document.getElementById('prof-score').textContent=fmtNum(u.score||0)+' ⭐';
  document.getElementById('prof-money').textContent=fmtNum(u.money||0)+' 💰';
  document.getElementById('prof-wins').textContent=(u.wins||0)+' 🏆';
  var lvl=Math.floor((u.score||0)/500)+1;
  var xp=(u.score||0)%500;
  document.getElementById('prof-level').textContent='Lv. '+lvl;
  document.getElementById('lv-cur').textContent=lvl;
  document.getElementById('lv-xp').textContent=xp;
  document.getElementById('lv-fill').style.width=(xp/500*100).toFixed(1)+'%';
  var earned=u.achievements||{};
  document.getElementById('badges').innerHTML=ACHIEVEMENTS.map(function(a){
    var e=earned[a.id];
    return'<div class="badge badge-tooltip'+(e?' earned':' locked')+'">'
      +'<span>'+a.icon+'</span><span>'+a.label+'</span>'
      +(e?'':'<span style="font-size:.58rem;opacity:.5;">🔒</span>')
      +'</div>';
  }).join('');
}

if(user){
  fillUI(user);
  db.ref('users/'+user.uid).get().then(function(snap){
    if(snap.exists()){var f=Object.assign({uid:user.uid},snap.val());saveSession(f);fillUI(f);}
  }).catch(function(){});
}

window.doLogout=async function(){
  if(user&&user.uid){try{await db.ref('users/'+user.uid).update({isOnline:false});}catch(e){}}
  localStorage.removeItem('ww_user'); sessionStorage.removeItem('ww_mode');location.href='login.html';
};

window.changePhoto=async function(){
  var url=prompt('Enter new photo URL:');
  if(!url||!url.startsWith('http')){alert('Please enter a valid URL starting with http');return;}
  await db.ref('users/'+user.uid).update({photoURL:url});
  var s=await db.ref('users/'+user.uid).get();
  var f=Object.assign({uid:user.uid},s.val());
  saveSession(f);fillUI(f);
};

window.deleteAccount=async function(){
  if(!confirm('Delete your account permanently? This cannot be undone.'))return;
  if(!confirm('Are you absolutely sure?'))return;
  await db.ref('users/'+user.uid).remove();
  await db.ref('usernames/'+user.username.toLowerCase()).remove();
  localStorage.removeItem('ww_user'); sessionStorage.removeItem('ww_mode');location.href='login.html';
};

/* ad */
(function(){
  var f=document.getElementById('ad-frame');if(!f)return;
  var close='<'+'/script>';
  var html='<!DOCTYPE html><html><head><style>*{margin:0;padding:0;}body{background:#0e0e1e;display:flex;align-items:center;justify-content:center;height:50px;overflow:hidden;}</style></head><body>'
    +'<script>var __jscp=function(){for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;if(a=window.parent==window?document.URL:document.referrer){var c=a.indexOf("://");0<=c&&(a=a.substring(c+3));c=a.indexOf("/");0<=c&&(a=a.substring(0,c))}var b={pu:a,"if":b,rn:new Number(Math.floor(99999999*Math.random())+1)},a=[],d;for(d in b)a.push(d+"="+encodeURIComponent(b[d]));return encodeURIComponent(a.join("&"))};document.write(\'<sc\'+\'ript src="//cpm.ezmob.com/tag?zone_id=338024&size=320x50&subid=&j=\'+__jscp()+\'"><\\/sc\'+\'ript>\');'
    +close+'</body></html>';
  if('srcdoc'in f){f.srcdoc=html;}else{var b=new Blob([html],{type:'text/html'});f.src=URL.createObjectURL(b);}
})();
</script>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bn-btn" onclick="location.href='index.html'" data-page="home">
    <span class="bn-icon">🏠</span>
    <span class="bn-lbl">Home</span>
  </button>
  <button class="bn-btn " onclick="location.href='leaderboard.html'" data-page="leaderboard">
    <span class="bn-icon">🏆</span>
    <span class="bn-lbl">Ranks</span>
  </button>
  <button class="bn-btn active" onclick="location.href='profile.html'" data-page="profile">
    <span class="bn-icon">👤</span>
    <span class="bn-lbl">Profile</span>
  </button>
  <button class="bn-btn" onclick="selectDailyMode()" data-page="daily">
    <span class="bn-icon">📅</span>
    <span class="bn-lbl">Daily</span>
  </button>
</nav>
<script>
function selectDailyMode(){
  var u=localStorage.getItem('ww_user');
  if(!u){location.href='login.html';return;}
  sessionStorage.setItem('ww_mode','daily');
  location.href='game.html';
}
</script>
<script src="/pwa.js"></script>
</body>
</html>
